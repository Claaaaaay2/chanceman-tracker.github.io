<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script>
        // Redirect all unknown routes back to index.html
        const redirect = `${location.pathname}${location.search}${location.hash}`;
        sessionStorage.redirect = redirect;
        location.replace(`/?redirect=${encodeURIComponent(redirect)}`);
    </script>
</head>

</html>
